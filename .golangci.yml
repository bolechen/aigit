version: "2"

run:
  timeout: 5m
  concurrency: 10
  allow-parallel-runners: true

linters:
  settings:
    staticcheck:
      checks:
        - all
        # disabled checkers
        - -SA1019
    revive:
      rules:
        - name: exported
          arguments:
            - "disable-stuttering-check"

  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - revive
    - whitespace
    - misspell
    - errorlint
    - testifylint
    - nilerr
    - whitespace

  disable:
    - lll
    - goprintffuncname

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
      - vendor$

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - golines
    - swaggo

  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/zzxwill/aigit)

    golines:
      max-len: 200

  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - vendor$
